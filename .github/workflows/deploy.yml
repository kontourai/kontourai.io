# Evidence lanes (issue #3):
#   - PR VALIDATION EVIDENCE = the "Build, Test & Validate" check on a pull
#     request (plus "Trust Verify"). Hermetic with one exception: npm-registry
#     parity runs in warn mode on PRs so out-of-band package releases can't
#     turn open PRs red.
#   - DEPLOY/RELEASE READINESS EVIDENCE = the same "Build, Test & Validate"
#     check on the main push (strict registry parity: a stale advertised
#     version blocks publishing) plus "Deploy to Cloudflare Pages" and the
#     post-deploy "Smoke Test" jobs, which only run on main.
#   - VERSION DRIFT is owned by the scheduled Pin Refresh workflow, which
#     regenerates product-status.json and opens the bump PR.
name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed by the parity-mode guard to list a PR's changed files.
  pull-requests: read

jobs:
  verify:
    name: Build, Test & Validate
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL }}

      - name: Rendered tests
        run: npx playwright test

      # Issue #3: warn mode exists ONLY for out-of-band registry drift. If the
      # PR itself touches the parity-sensitive inputs — the compared metadata,
      # the page whose install copy is checked, or the validation policy — it
      # must face the strict gate, or a PR could author a stale version /
      # remove install copy and merge on a warning (PR #122 review, HIGH).
      - name: Determine registry-parity mode
        id: parity
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          # ALLOWLIST, fail-closed: warn only when every changed file is
          # provably parity-irrelevant content. A denylist kept losing to new
          # execution-influencing files (package.json scripts, .npmrc
          # script-shell, helper scripts) — anything not recognized below,
          # including a brand-new file type, defaults to strict.
          mode=warn
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              src/pages/flow-agents.astro) mode=strict; break ;;
              src/pages/*|src/components/*|src/styles/*|src/lib/*|src/layouts/*|src/data/receipts/*|public/*|tests/*|docs/*|*.md) ;;
              *) mode=strict; break ;;
            esac
          done <<<"$files"
          echo "parity-sensitive file check -> mode=$mode"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: npm run validate
        env:
          # PR lane: warn (unless the guard above says the PR touched
          # parity-sensitive inputs). Main lane: always strict — a stale
          # advertised version blocks publishing; the scheduled Pin Refresh
          # lane owns the version bump.
          VALIDATE_REGISTRY_PARITY: ${{ github.event_name == 'pull_request' && steps.parity.outputs.mode || 'strict' }}

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL }}

      - name: Deploy to Cloudflare Pages
        run: npm exec -- wrangler pages deploy dist --project-name=kontourai-io --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check public routes
        run: |
          for path in \
            / \
            /veritas/ \
            /surface/ \
            /survey/ \
            /flow/ \
            /flow-agents/ \
            /console/ \
            /developers/ \
            /early-access/
          do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://kontourai.io${path}")
            echo "kontourai.io${path} → $STATUS"
            [ "$STATUS" = "200" ] || exit 1
          done

      - name: Check kontourai.com redirects to kontourai.io
        run: |
          LOCATION=$(curl -s -o /dev/null -w "%{redirect_url}" https://kontourai.com/)
          echo "kontourai.com → $LOCATION"
          echo "$LOCATION" | grep -q "kontourai.io" || exit 1
