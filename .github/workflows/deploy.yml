name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Build, Test & Validate
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL }}

      - name: Rendered tests
        run: npx playwright test

      - name: Validate
        run: npm run validate

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
          PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL: ${{ vars.PUBLIC_CLOUDFLARE_WEB_ANALYTICS_URL }}

      - name: Deploy to Cloudflare Pages
        run: npm exec -- wrangler pages deploy dist --project-name=kontourai-io --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kontourai.io/)
          echo "kontourai.io → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check /veritas
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kontourai.io/veritas/)
          echo "kontourai.io/veritas → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check /surface
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kontourai.io/surface/)
          echo "kontourai.io/surface → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check kontourai.com redirects to kontourai.io
        run: |
          LOCATION=$(curl -s -o /dev/null -w "%{redirect_url}" https://kontourai.com/)
          echo "kontourai.com → $LOCATION"
          echo "$LOCATION" | grep -q "kontourai.io" || exit 1
