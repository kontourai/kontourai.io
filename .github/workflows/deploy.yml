name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate
        run: npm run validate

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy dist --project-name=kontourai-io --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kontourai.io/)
          echo "kontourai.io → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check /veritas
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kontourai.io/veritas/)
          echo "kontourai.io/veritas → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check /surface
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kontourai.io/surface/)
          echo "kontourai.io/surface → $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check kontourai.com redirects to kontourai.io
        run: |
          LOCATION=$(curl -s -o /dev/null -w "%{redirect_url}" https://kontourai.com/)
          echo "kontourai.com → $LOCATION"
          echo "$LOCATION" | grep -q "kontourai.io" || exit 1
