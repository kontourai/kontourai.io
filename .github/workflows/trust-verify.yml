# Trust Verify — dogfoods the Flow Agents external trust anchor on this repo.
#
# On every PR, re-runs this repo's canonical verification FRESH in a clean CI
# environment an agent does not control (build + the content/theme/security/validate
# checks). If a Flow Agents session has published delivery/trust.bundle, it also
# RECONCILES the agent's claimed passes against CI's own fresh results and fails on
# any divergence. When no bundle is present, only the fresh verify is enforced
# (fail-open on bundle absence; fail-closed on divergence when present).
#
# To ARM it: add "Trust Verify" as a required, no-bypass status check in this repo's
# branch protection. Until then it runs and reports but does not block.
#
# Adoption guide: https://github.com/kontourai/flow-agents/blob/main/docs/trust-anchor-adoption.md
name: Trust Verify

on:
  pull_request:

permissions:
  contents: read
  # Needed by the parity-mode guard to list a PR's changed files.
  pull-requests: read

jobs:
  trust-verify:
    name: Trust Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Install this repo's deps so the verify-command (astro build + validators) runs.
      - run: npm ci
      # Issue #3: same parity-mode guard as deploy.yml's verify job — warn is
      # only for out-of-band registry drift; a PR that touches the compared
      # metadata, the checked install copy, or validation policy stays strict.
      - name: Determine registry-parity mode
        id: parity
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          # ALLOWLIST, fail-closed: warn only when every changed file is
          # provably parity-irrelevant content. A denylist kept losing to new
          # execution-influencing files (package.json scripts, .npmrc
          # script-shell, helper scripts) — anything not recognized below,
          # including a brand-new file type, defaults to strict.
          mode=warn
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              src/pages/flow-agents.astro) mode=strict; break ;;
              src/pages/*|src/components/*|src/styles/*|src/lib/*|src/layouts/*|src/data/receipts/*|public/*|tests/*|docs/*|*.md) ;;
              *) mode=strict; break ;;
            esac
          done <<<"$files"
          echo "parity-sensitive file check -> mode=$mode"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
      # The external anchor: re-run our real verify fresh + reconcile any delivered bundle.
      # SHA-pinned (mutable tags are not trusted for a cross-repo action that gates merges).
      #
      # verify-command is the full `npm run build && npm run validate` — build + content
      # boundary + theme tokens + security hardening + npm version-parity. On this
      # pull_request-only anchor, registry parity is OBSERVED (warn) rather than gated
      # unless the PR itself touched parity-sensitive inputs; the strict parity gate
      # lives in the main/deploy verify run and the scheduled Pin Refresh lane.
      - uses: kontourai/flow-agents/.github/actions/trust-verify@2aa332a723bf1b421863e39b2d998032d96bec85 # flow-agents @ trust-verify action-path fix
        env:
          VALIDATE_REGISTRY_PARITY: ${{ steps.parity.outputs.mode }}
        with:
          verify-command: "npm run build && npm run validate"
