# Trust Verify — dogfoods the Flow Agents external trust anchor on this repo.
#
# On every PR, re-runs this repo's canonical verification FRESH in a clean CI
# environment an agent does not control (build + the content/theme/security/validate
# checks). If a Flow Agents session has published delivery/trust.bundle, it also
# RECONCILES the agent's claimed passes against CI's own fresh results and fails on
# any divergence. When no bundle is present, only the fresh verify is enforced
# (fail-open on bundle absence; fail-closed on divergence when present).
#
# To ARM it: add "Trust Verify" as a required, no-bypass status check in this repo's
# branch protection. Until then it runs and reports but does not block.
#
# Adoption guide: https://github.com/kontourai/flow-agents/blob/main/docs/trust-anchor-adoption.md
name: Trust Verify

on:
  pull_request:

permissions:
  contents: read
  # Needed by the parity-mode guard to list a PR's changed files.
  pull-requests: read

jobs:
  trust-verify:
    name: Trust Verify
    runs-on: ubuntu-latest
    steps:
      # fetch-depth 0: the reconciler binds delivery bundles to commits via
      # `git merge-base --is-ancestor`, which cannot walk a shallow clone —
      # with the default depth-1 checkout every committed bundle looks stale
      # in CI (sealed commit never equals the synthetic merge SHA).
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Issue #3: authoritative registry-parity gate — same script and mode
      # resolution as deploy.yml's verify job (warn only for pull_requests
      # whose changed files avoid every parity-sensitive path; fail-closed).
      # Runs before npm ci, before any PR-controlled code executes.
      - name: Registry parity (pre-install gate)
        id: parity
        run: node scripts/check-registry-parity.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
      # Install this repo's deps so the verify-command (site build + validators) runs.
      - run: npm ci
      # Browsers for the rendered suite, so delivery bundles claiming
      # `npm run test:rendered` reconcile here instead of being
      # unreconcilable on a bare runner (#156). Deliberately NOT the
      # playwright job-container: composite actions resolve
      # github.action_path to the host path inside job containers
      # (flow-agents upstream issue), and `playwright install` always
      # matches the @playwright/test version npm ci just installed.
      - run: npx playwright install --with-deps chromium
      # The external anchor: re-run our real verify fresh + reconcile any delivered bundle.
      # SHA-pinned (mutable tags are not trusted for a cross-repo action that gates merges).
      #
      # verify-command is `npm run check:site-verify`: its strict local wrapper runs
      # `npm run build`, `npm run validate`, then asserts `dist/index.html` — build + content
      # boundary + theme tokens + security hardening + npm version-parity. On this
      # pull_request-only anchor, registry parity is OBSERVED (warn) rather than gated
      # unless the PR itself touched parity-sensitive inputs; the strict parity gate
      # lives in the main/deploy verify run and the scheduled Pin Refresh lane.
      - uses: kontourai/flow-agents/.github/actions/trust-verify@12f12e3d0a32b398e47a9ac01604179c58bf14ba # flow-agents @ trust-verify action-path fix
        env:
          VALIDATE_REGISTRY_PARITY: ${{ steps.parity.outputs.mode || 'strict' }}
        with:
          verify-command: "npm run check:site-verify"
