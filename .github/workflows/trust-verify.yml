# Trust Verify — dogfoods the Flow Agents external trust anchor on this repo.
#
# On every PR, re-runs this repo's canonical verification FRESH in a clean CI
# environment an agent does not control (build + the content/theme/security/validate
# checks). If a Flow Agents session has published delivery/trust.bundle, it also
# RECONCILES the agent's claimed passes against CI's own fresh results and fails on
# any divergence. When no bundle is present, only the fresh verify is enforced
# (fail-open on bundle absence; fail-closed on divergence when present).
#
# To ARM it: add "Trust Verify" as a required, no-bypass status check in this repo's
# branch protection. Until then it runs and reports but does not block.
#
# Adoption guide: https://github.com/kontourai/flow-agents/blob/main/docs/trust-anchor-adoption.md
name: Trust Verify

on:
  pull_request:

permissions:
  contents: read

jobs:
  trust-verify:
    name: Trust Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Install this repo's deps so the verify-command (astro build + validators) runs.
      - run: npm ci
      # The external anchor: re-run our real verify fresh + reconcile any delivered bundle.
      # SHA-pinned (mutable tags are not trusted for a cross-repo action that gates merges).
      #
      # verify-command is the full `npm run build && npm run validate` — build + content
      # boundary + theme tokens + security hardening + npm version-parity. (The version-parity
      # drift was resolved in the product-status sync, so validate is now enforced here.)
      - uses: kontourai/flow-agents/.github/actions/trust-verify@2aa332a723bf1b421863e39b2d998032d96bec85 # flow-agents @ trust-verify action-path fix
        with:
          verify-command: "npm run build && npm run validate"
